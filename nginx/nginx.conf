# ══════════════════════════════════════════════════════════════
# VendorIQ — Nginx Reverse Proxy
# Handles: SSL termination, rate limiting, compression,
#          security headers, API + frontend routing
# ══════════════════════════════════════════════════════════════

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off; # Don't expose nginx version

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Rate limiting zones ───────────────────────────────────────
    # Global: 100 req/min per IP
    limit_req_zone $binary_remote_addr zone=global:10m    rate=100r/m;
    # Auth endpoints: 10 req/min (brute force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m      rate=10r/m;
    # API key endpoints: 60 req/min
    limit_req_zone $binary_remote_addr zone=v1api:10m     rate=60r/m;
    # Webhook endpoints: 30 req/min
    limit_req_zone $binary_remote_addr zone=webhook:10m   rate=30r/m;

    # ── SSL settings ──────────────────────────────────────────────
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  off;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;
    resolver                   8.8.8.8 8.8.4.4 valid=300s;

    # ── Upstream servers ──────────────────────────────────────────
    upstream api_backend {
        least_conn;
        server api:4000 fail_timeout=10s max_fails=3;
        keepalive 32;
    }

    upstream frontend_backend {
        server frontend:3000 fail_timeout=10s max_fails=3;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────
    server {
        listen 80;
        server_name vendoriq.in www.vendoriq.in;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name vendoriq.in www.vendoriq.in;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        client_max_body_size 10m;  # Allow bulk audit file uploads

        # ── Security headers ────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "SAMEORIGIN"    always;
        add_header X-Content-Type-Options     "nosniff"       always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header X-XSS-Protection           "1; mode=block" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.razorpay.com; frame-src https://api.razorpay.com;" always;

        # ── Global rate limit ────────────────────────────────────────
        limit_req zone=global burst=20 nodelay;
        limit_req_status 429;

        # ── Health check (no rate limit, no auth) ────────────────────
        location = /api/health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Auth endpoints (strict rate limit) ───────────────────────
        location ~ ^/api/auth/(login|register|refresh) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Razorpay webhooks (raw body needed) ──────────────────────
        location ~ ^/api/(payments|subscriptions)/webhook {
            limit_req zone=webhook burst=10;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_request_buffering off; # Don't buffer webhook bodies
            proxy_read_timeout 30s;
        }

        # ── CA Partner API (per-key rate limit) ──────────────────────
        location /api/v1/ {
            limit_req zone=v1api burst=15 nodelay;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Bulk audit file upload (large body, longer timeout) ──────
        location = /api/bulk-audit {
            client_max_body_size 6m;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── All other API routes ──────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_read_timeout 120s; # Reports can take up to 5 min
            proxy_send_timeout 120s;
        }

        # ── Static assets (Next.js /_next/) ──────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend_backend;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # ── Frontend (Next.js) ────────────────────────────────────────
        location / {
            proxy_pass         http://frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Deny hidden files ─────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
